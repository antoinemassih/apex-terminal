name: Design System Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  design-system-check:
    name: Check for raw egui primitives
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/check-design-system.sh

      - name: Run design-system lint guard
        run: scripts/check-design-system.sh
