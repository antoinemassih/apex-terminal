# Apex Terminal — Design Tokens
# Edit this file to change any visual property. Changes hot-reload instantly.
# Press F12 in the app to open the visual inspector.

[font]
xxs = 7.0          # micro labels on chart painter
xs = 8.0           # column headers, status chips
sm_tight = 9.0     # compact rows, watchlist rows
sm = 10.0          # body text, labels, most buttons
md = 11.0          # panel section headers
input = 12.0       # form inputs, quantity/price fields
lg = 13.0          # primary headings, toolbar buttons
xl = 14.0          # large price values in cards
xxl = 15.0         # featured prices, big display
display = 28.0     # hero numbers, large gauges
display_lg = 36.0  # biggest display text

[spacing]
xs = 2.0
sm = 4.0
md = 6.0
lg = 8.0
xl = 10.0
xxl = 12.0
xxxl = 20.0

[radius]
xs = 2.0    # hairline rects in painter
sm = 3.0    # small buttons, badges, chips
md = 4.0    # primary buttons, cards
lg = 8.0    # dialogs, panels, modals

[stroke]
hair = 0.3     # ultra-fine grid/DOM separators
thin = 0.5     # separators, card borders, badges
std = 1.0      # panel frames, dialog windows
bold = 1.5     # emphasis outlines
thick = 2.0    # tab underlines, accent stripes
heavy = 2.5    # extra bold chart elements
xheavy = 5.0   # maximum emphasis

[alpha]
faint = 10     # barely-visible tints
ghost = 15     # hover row bg, chart bar fills
soft = 20      # soft hover states
subtle = 25    # section backgrounds, dim overlays
tint = 30      # action button fill (enabled)
muted = 40     # section separators
line = 50      # card borders, row dividers
dim = 60       # mid-tone chart elements
strong = 80    # panel frame borders
active = 100   # active button borders
heavy = 120    # dialog borders, high-contrast

[shadow]
offset = 2.0
alpha = 60
spread = 4.0
gradient = [20, 12, 4]

[color]
text_primary = [220, 220, 230, 255]
text_secondary = [200, 200, 210, 255]
text_dim = [180, 180, 195, 255]
text_on_accent = [255, 255, 255, 255]

amber = [255, 191, 0, 255]
earnings = [255, 193, 37, 255]
paper_orange = [255, 165, 0, 255]
live_green = [46, 204, 113, 255]
danger = [224, 85, 96, 255]
triggered_red = [231, 76, 60, 255]
dark_pool = [180, 100, 255, 255]
info_blue = [100, 200, 255, 255]
discord = [88, 101, 242, 255]

dialog_fill = [26, 26, 32, 255]
dialog_border = [60, 60, 70, 80]
deep_bg = [10, 12, 16, 255]
deep_bg_alt = [12, 14, 18, 255]

pane_tints = [
    [62, 120, 180, 30],
    [180, 100, 255, 30],
    [46, 204, 113, 30],
    [255, 191, 0, 30],
]

