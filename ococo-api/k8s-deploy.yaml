apiVersion: apps/v1
kind: Deployment
metadata:
  name: ococo-api
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ococo-api
  template:
    metadata:
      labels:
        app: ococo-api
      annotations:
        linkerd.io/inject: disabled
    spec:
      initContainers:
        - name: clone
          image: alpine/git:latest
          command: ['sh', '-c', 'git clone http://antoine:monkeyxx@192.168.1.42:3000/OCOCO/apex-terminal.git /workspace']
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: api
          image: node:22-alpine
          command: ['sh', '-c', 'cd /workspace/ococo-api && npm install --omit=dev 2>&1 && node dist/index.js']
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: ococo-api-env
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ococo-api
  namespace: dev
spec:
  selector:
    app: ococo-api
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ococo-api
  namespace: dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: ococo-dev.xllio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ococo-api
                port:
                  number: 3000
  tls:
    - hosts:
        - ococo-dev.xllio.com
