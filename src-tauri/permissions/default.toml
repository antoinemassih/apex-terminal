[[permission]]
identifier = "allow-open-native-chart"
description = "Open native GPU chart window"
commands.allow = ["open_native_chart"]

[[permission]]
identifier = "allow-greet"
description = "Greet command"
commands.allow = ["greet"]

[[permission]]
identifier = "allow-get-bars"
description = "Fetch OHLCV bars"
commands.allow = ["get_bars"]

[[permission]]
identifier = "allow-get-options-chain"
description = "Fetch options chain"
commands.allow = ["get_options_chain"]

[[permission]]
identifier = "allow-drawings-load-all"
description = "Load all drawings"
commands.allow = ["drawings_load_all"]

[[permission]]
identifier = "allow-drawings-load-symbol"
description = "Load drawings for symbol"
commands.allow = ["drawings_load_symbol"]

[[permission]]
identifier = "allow-drawings-save"
description = "Save drawing"
commands.allow = ["drawings_save"]

[[permission]]
identifier = "allow-drawings-update-points"
description = "Update drawing points"
commands.allow = ["drawings_update_points"]

[[permission]]
identifier = "allow-drawings-update-style"
description = "Update drawing style"
commands.allow = ["drawings_update_style"]

[[permission]]
identifier = "allow-drawings-remove"
description = "Remove drawing"
commands.allow = ["drawings_remove"]

[[permission]]
identifier = "allow-drawings-clear"
description = "Clear drawings"
commands.allow = ["drawings_clear"]

[[permission]]
identifier = "allow-groups-load-all"
description = "Load groups"
commands.allow = ["groups_load_all"]

[[permission]]
identifier = "allow-groups-save"
description = "Save group"
commands.allow = ["groups_save"]

[[permission]]
identifier = "allow-groups-remove"
description = "Remove group"
commands.allow = ["groups_remove"]

[[permission]]
identifier = "allow-groups-update-style"
description = "Update group style"
commands.allow = ["groups_update_style"]

[[permission]]
identifier = "allow-drawings-apply-group-style"
description = "Apply group style to drawings"
commands.allow = ["drawings_apply_group_style"]

[[permission]]
identifier = "allow-ib-ws-send"
description = "Send IB WebSocket message"
commands.allow = ["ib_ws_send"]

[default]
description = "All app commands allowed"
permissions = [
  "allow-open-native-chart",
  "allow-greet",
  "allow-get-bars",
  "allow-get-options-chain",
  "allow-drawings-load-all",
  "allow-drawings-load-symbol",
  "allow-drawings-save",
  "allow-drawings-update-points",
  "allow-drawings-update-style",
  "allow-drawings-remove",
  "allow-drawings-clear",
  "allow-groups-load-all",
  "allow-groups-save",
  "allow-groups-remove",
  "allow-groups-update-style",
  "allow-drawings-apply-group-style",
  "allow-ib-ws-send",
]
